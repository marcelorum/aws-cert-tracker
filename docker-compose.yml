services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: aws-cert-tracker:latest
    container_name: aws-cert-tracker
    ports:
      - "127.0.0.1:3001:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      retries: 2
      start_period: 10s
