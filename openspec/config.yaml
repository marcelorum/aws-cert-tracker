# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: React 19 + Vite 6 + TypeScript (strict) SPA. Offline-first CLF-C02 exam tracker.
  Persistence: Dexie.js (IndexedDB) with auto-seeded CLF-C02 topic tree.
  State: Zustand v5 (UI state only; domain state lives in Dexie).
  Styling: Tailwind CSS v4 + Radix UI primitives + Lucide icons.
  PWA: vite-plugin-pwa (generateSW, auto-update, runtime caching for images).
  Architecture: Container-presentational. Pages orchestrate; components are pure presentational.
    Dexie hooks (useLiveQuery) bridge IndexedDB to React. Zustand handles ephemeral UI state
    (sidebar, expand/collapse, active topic). No backend — fully offline.
  Build: tsc -b (strict mode) + vite build.
  Routing: react-router v7.
  Alias: @/ → /src.

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: pnpm test:run
  verify:
    test_command: pnpm test:run
    build_command: pnpm build
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  runner: vitest
  layers:
    unit: true
    integration: true
    e2e: false
  coverage: true
  quality:
    linter: null
    type_checker: tsc -b
    formatter: null
