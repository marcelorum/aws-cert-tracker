<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AWS CLF-C02 Certification Tracker — track your Cloud Practitioner study progress" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      (function() {
        var theme = localStorage.getItem('theme-storage');
        if (theme) {
          try {
            var parsed = JSON.parse(theme);
            if (parsed.state && parsed.state.themeMode === 'dark' ||
                (parsed.state && parsed.state.themeMode === 'system' &&
                 window.matchMedia('(prefers-color-scheme: dark)').matches)) {
              document.documentElement.classList.add('dark');
            }
          } catch(e) {}
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <title>CLF-C02 Tracker</title>
  </head>
    <body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
